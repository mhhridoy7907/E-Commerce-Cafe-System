<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cafe Menu Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
        <link rel="stuleshet" herf="menu.css">
  
</head>

<body>

<header>

<div class="top-bar">

<h1 class="logo">Cafe Menu</h1>

<div class="search-box">

<input
class="search"
placeholder="Search..."
onkeyup="searchFood(this.value)"
>

<select id="categoryBox" onchange="filterCategory()">

<option value="ALL">
✨ All Categories
</option>

</select>

</div>

</div>

</header>

<div class="container" id="menu">
Loading...
</div>

<!-- ORDER MODAL -->

<div class="modal" id="orderModal">

<div class="modal-box">

<h2>Place Order</h2>

<input id="name" placeholder="Name">

<input id="phone" placeholder="Phone">

<textarea id="address" placeholder="Address"></textarea>

<input id="qty" type="number" placeholder="Qty">

<button onclick="confirmOrder()">
Confirm Order
</button>

<button onclick="closeModal()">
Close
</button>

</div>

</div>

<!-- INVOICE -->

<div class="invoice" id="invoice">

<div class="invoice-box">

<h2>Invoice</h2>

<p id="invName"></p>

<p id="invPhone"></p>

<p id="invProduct"></p>

<p id="invQty"></p>

<p id="invOtp"></p>

<div class="bill" id="invBill"></div>

<button onclick="downloadPDF()">
Download PDF
</button>

<button onclick="closeInvoice()">
Close
</button>

</div>

</div>

          <script src="menu.js"> </script>

</body>
</html>
